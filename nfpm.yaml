name: "lakesql"
arch: "${NFPM_ARCH}"
platform: "linux"
version: "${NFPM_VERSION}"
section: "database"
priority: "extra"
maintainer: "TiDB Cloud Authors <engineering@tidbcloud.com>"
description: |
  LakeSQL is a native command line tool for TiDB Cloud Lake.
vendor: "PingCAP"
homepage: "https://github.com/tidbcloud/lakesql"
license: "Apache-2.0"
rpm:
  signature:
    key_file: "${NFPM_GPG_KEY_FILE}"
deb:
  signature:
    key_file: "${NFPM_GPG_KEY_FILE}"
    type: origin
apk:
  signature:
    key_file: "${NFPM_APK_KEY_FILE}"
    key_name: "${NFPM_APK_KEY_NAME}"
contents:
- src: "${NFPM_SOURCE_BINARY}"
  dst: /usr/bin/lakesql
  expand: true
  file_info:
    mode: 0755
