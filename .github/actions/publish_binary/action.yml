name: "Package Binary"
description: "Package LakeSQL release archives for S3 publishing"
inputs:
  os:
    description: "Operating system"
    required: true
  target:
    description: "Release target"
    required: true
  version:
    description: "Release version"
    required: true
outputs:
  file:
    description: "Packaged archive name"
    value: ${{ steps.package.outputs.file }}
runs:
  using: "composite"
  steps:
    - name: Pack binary
      id: package
      shell: bash
      run: |
        mkdir -p dist
        case "${{ inputs.os }}" in
          linux|macos)
            tar -czf "dist/lakesql-${{ inputs.target }}.tar.gz" -C "target/${{ inputs.target }}/release" lakesql
            echo "file=lakesql-${{ inputs.target }}.tar.gz" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "Unsupported OS: ${{ inputs.os }}"
            exit 1
            ;;
        esac
