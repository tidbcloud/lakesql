name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    name: Check version and create release
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for version change
        id: check
        run: |
          # Get the current version from Cargo.toml
          CURRENT_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')

          # Get the previous version from the last commit
          git checkout HEAD~1 -- Cargo.toml 2>/dev/null || true
          if [ -f Cargo.toml ]; then
            PREVIOUS_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
            git checkout HEAD -- Cargo.toml
          else
            PREVIOUS_VERSION=""
          fi

          echo "Current version: $CURRENT_VERSION"
          echo "Previous version: $PREVIOUS_VERSION"

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ] && [ -n "$CURRENT_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=v$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
            echo "No version change detected"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.version_changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.check.outputs.new_version }}
          echo "Creating release for $VERSION"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --generate-notes \
            || echo "Release already exists"

  build_linux:
    needs: check
    if: needs.check.outputs.version_changed == 'true'
    name: build ${{ matrix.target }}
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Setup Cross
        shell: bash
        run: |
          curl -sSfLo /tmp/cross.tar.gz https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf /tmp/cross.tar.gz -C /tmp
          sudo mv /tmp/cross /usr/local/bin/cross
      - name: Build
        shell: bash
        run: |
          cross build --release --target=${{ matrix.target }} --bin=lakesql
      - name: Package Binary
        id: package
        uses: ./.github/actions/publish_binary
        with:
          os: linux
          target: ${{ matrix.target }}
          version: ${{ needs.check.outputs.new_version }}
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ steps.package.outputs.file }}
          if-no-files-found: error

  build_other:
    needs: check
    if: needs.check.outputs.version_changed == 'true'
    name: build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: macos
            target: aarch64-apple-darwin
          - os: macos
            target: x86_64-apple-darwin
          # FIXME: Windows build is broken
          # - os: windows
          #   target: aarch64-pc-windows-msvc
          # - os: windows
          #   target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Build
        shell: bash
        run: |
          cargo build --release --target=${{ matrix.target }} --bin=lakesql
      - name: Package Binary
        id: package
        uses: ./.github/actions/publish_binary
        with:
          os: ${{ matrix.os }}
          target: ${{ matrix.target }}
          version: ${{ needs.check.outputs.new_version }}
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ steps.package.outputs.file }}
          if-no-files-found: error

  publish_s3:
    needs: [check, build_linux, build_other]
    if: needs.check.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Binary Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true
      - name: Prepare Release Metadata
        env:
          VERSION: ${{ needs.check.outputs.new_version }}
        run: |
          set -euo pipefail
          ls -l dist
          (
            cd dist
            sha256sum lakesql-*.tar.gz | LC_ALL=C sort > checksums.txt
          )
          cat > dist/latest.json <<EOF
          {
            "version": "${VERSION}"
          }
          EOF
      - name: Publish binaries, installer, and metadata to S3
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY || secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'auto' }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL || secrets.R2_ENDPOINT_URL }}
          VERSION: ${{ needs.check.outputs.new_version }}
        run: |
          set -euo pipefail
          endpoint_args=()
          if [ -n "${AWS_ENDPOINT_URL:-}" ]; then
            endpoint_args+=(--endpoint-url "${AWS_ENDPOINT_URL}")
          fi

          for file in dist/lakesql-*.tar.gz dist/checksums.txt; do
            aws "${endpoint_args[@]}" s3 cp \
              "${file}" \
              "s3://lakesql-binaries/lakesql/${VERSION}/$(basename "${file}")" \
              --no-progress \
              --checksum-algorithm=CRC32
          done

          aws "${endpoint_args[@]}" s3 cp \
            install/lakesql.sh \
            s3://lakesql-binaries/install/lakesql.sh \
            --no-progress \
            --checksum-algorithm=CRC32

          aws "${endpoint_args[@]}" s3 cp \
            dist/latest.json \
            s3://lakesql-binaries/lakesql/latest.json \
            --no-progress \
            --checksum-algorithm=CRC32
