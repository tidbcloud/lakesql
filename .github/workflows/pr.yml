name: PR Assistant

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize

jobs:
  title:
    runs-on: ubuntu-latest
    steps:
      - uses: reviewdog/action-actionlint@v1
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ github.token }}
